<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#047857"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="580" fill="#ffffff"/>

  <text x="450" y="26" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">DES Round Function f and Key Schedule</text>
  <text x="450" y="44" text-anchor="middle" font-size="12" fill="#6b7280">(Diagram 2 of 2 — the same structure is used identically for every round, i = 1 to 16)</text>

  <!-- ============ LEFT: ROUND FUNCTION ============ -->
  <text x="225" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Round Function (Round i)</text>

  <rect x="40" y="72" width="160" height="40" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="120" y="97" text-anchor="middle" font-size="13" fill="#78350f">L(i-1)  [32-bit]</text>

  <rect x="230" y="72" width="160" height="40" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="310" y="97" text-anchor="middle" font-size="13" fill="#78350f">R(i-1)  [32-bit]</text>

  <line x1="310" y1="112" x2="310" y2="138" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="210" y="140" width="200" height="40" rx="8" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="310" y="165" text-anchor="middle" font-size="12.5" fill="#312e81">Expansion E (32 → 48 bit)</text>

  <line x1="310" y1="180" x2="310" y2="202" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <circle cx="310" cy="220" r="18" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="310" y="226" text-anchor="middle" font-size="16" fill="#991b1b">⊕</text>

  <line x1="310" y1="238" x2="310" y2="258" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="190" y="260" width="240" height="40" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
  <text x="310" y="280" text-anchor="middle" font-size="12" fill="#831843">Substitution S-Boxes</text>
  <text x="310" y="294" text-anchor="middle" font-size="11" fill="#831843">S1 – S8  (48 → 32 bit)</text>

  <line x1="310" y1="300" x2="310" y2="322" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="220" y="324" width="180" height="40" rx="8" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="310" y="349" text-anchor="middle" font-size="12.5" fill="#312e81">Permutation P-box</text>

  <line x1="310" y1="364" x2="310" y2="396" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <circle cx="310" cy="414" r="18" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="310" y="420" text-anchor="middle" font-size="16" fill="#991b1b">⊕</text>

  <line x1="310" y1="432" x2="310" y2="454" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="190" y="456" width="240" height="44" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="310" y="474" text-anchor="middle" font-size="12" fill="#78350f">R(i) [32-bit] =</text>
  <text x="310" y="490" text-anchor="middle" font-size="11.5" fill="#78350f">L(i-1) ⊕ f(R(i-1), Ki)</text>

  <!-- L(i-1) feeds into second XOR -->
  <path d="M120,112 L120,414 L292,414" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <!-- R(i-1) passthrough becomes L(i) -->
  <path d="M390,92 L455,92 L455,478 L200,478" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>
  <rect x="40" y="456" width="150" height="44" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="115" y="474" text-anchor="middle" font-size="12" fill="#78350f">L(i) [32-bit] =</text>
  <text x="115" y="490" text-anchor="middle" font-size="11.5" fill="#78350f">R(i-1)</text>

  <!-- ============ RIGHT: KEY SCHEDULE ============ -->
  <text x="700" y="64" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Key Schedule</text>

  <rect x="590" y="72" width="220" height="40" rx="8" fill="#d1fae5" stroke="#047857" stroke-width="1.5"/>
  <text x="700" y="97" text-anchor="middle" font-size="12.5" fill="#065f46">64-bit Key (incl. 8 parity bits)</text>

  <line x1="700" y1="112" x2="700" y2="134" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="570" y="136" width="260" height="40" rx="8" fill="#d1fae5" stroke="#047857" stroke-width="1.5"/>
  <text x="700" y="153" text-anchor="middle" font-size="11.5" fill="#065f46">PC-1: Permuted Choice 1</text>
  <text x="700" y="168" text-anchor="middle" font-size="11" fill="#065f46">(drop parity bits) → 56-bit key</text>

  <line x1="700" y1="176" x2="700" y2="198" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="630" y="200" width="110" height="40" rx="8" fill="#d1fae5" stroke="#047857" stroke-width="1.5"/>
  <text x="685" y="225" text-anchor="middle" font-size="12.5" fill="#065f46">C0 (28-bit)</text>
  <rect x="760" y="200" width="110" height="40" rx="8" fill="#d1fae5" stroke="#047857" stroke-width="1.5"/>
  <text x="815" y="225" text-anchor="middle" font-size="12.5" fill="#065f46">D0 (28-bit)</text>

  <path d="M685,240 L685,256 L700,256" fill="none" stroke="#374151" stroke-width="1.5"/>
  <path d="M815,240 L815,256 L700,256" fill="none" stroke="#374151" stroke-width="1.5"/>
  <line x1="700" y1="256" x2="700" y2="272" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="570" y="274" width="260" height="40" rx="8" fill="#d1fae5" stroke="#047857" stroke-width="1.5"/>
  <text x="700" y="292" text-anchor="middle" font-size="11.5" fill="#065f46">Left Circular Shift(s)</text>
  <text x="700" y="307" text-anchor="middle" font-size="10.5" fill="#065f46">(1 or 2 bits, per round i) → Ci, Di</text>

  <line x1="700" y1="314" x2="700" y2="336" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="570" y="338" width="260" height="40" rx="8" fill="#d1fae5" stroke="#047857" stroke-width="1.5"/>
  <text x="700" y="356" text-anchor="middle" font-size="11.5" fill="#065f46">PC-2: Permuted Choice 2</text>
  <text x="700" y="371" text-anchor="middle" font-size="10.5" fill="#065f46">(select 48 of 56 bits)</text>

  <line x1="700" y1="378" x2="700" y2="400" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="600" y="402" width="200" height="40" rx="8" fill="#a7f3d0" stroke="#047857" stroke-width="2"/>
  <text x="700" y="427" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Round Key Ki  (48-bit)</text>

  <!-- loop back for 16 rounds -->
  <path d="M800,422 L860,422 L860,294 L830,294" fill="none" stroke="#047857" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="865" y="360" font-size="11" fill="#047857" transform="rotate(90 865 360)" text-anchor="middle">repeat for i = 1 … 16</text>

  <!-- dashed connection from Ki into round function XOR -->
  <path d="M600,422 L480,422 L480,220 L328,220" fill="none" stroke="#047857" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>
  <text x="484" y="416" font-size="12" fill="#047857">Ki</text>

  <!-- legend -->
  <g font-size="11" fill="#374151">
    <rect x="40" y="525" width="14" height="14" fill="#e0e7ff" stroke="#4338ca"/>
    <text x="58" y="536">Permutation</text>
    <rect x="160" y="525" width="14" height="14" fill="#fce7f3" stroke="#be185d"/>
    <text x="178" y="536">Substitution (S-box)</text>
    <rect x="330" y="525" width="14" height="14" fill="#fee2e2" stroke="#dc2626"/>
    <text x="348" y="536">XOR (⊕)</text>
    <rect x="430" y="525" width="14" height="14" fill="#d1fae5" stroke="#047857"/>
    <text x="448" y="536">Key schedule step</text>
    <rect x="590" y="525" width="14" height="14" fill="#fef3c7" stroke="#b45309"/>
    <text x="608" y="536">Data (32-bit half)</text>
  </g>
  <text x="450" y="560" text-anchor="middle" font-size="11.5" fill="#6b7280" font-style="italic">
    Note: Expansion (E), S-Boxes, and Permutation (P) together provide DES's "confusion and diffusion" — the core security mechanism.
  </text>
</svg>
